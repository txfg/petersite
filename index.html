document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

2px,4.4vw,52px);line-height:1.04;margin:0;max-width:20ch;\">Sustainable Building Initiative<\u002Fh2>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- feature media -->\n      <div data-reveal=\"\" style=\"position:relative;width:100%;aspect-ratio:16/9;border-radius:5px;overflow:hidden;background:#232B38;background-image:repeating-linear-gradient(135deg,rgba(255,255,255,0.045) 0 1px,transparent 1px 13px);display:flex;align-items:center;justify-content:center;margin:36px 0 14px;box-shadow:0 24px 50px -34px rgba(28,26,22,0.6);\">\n        <span style=\"position:absolute;width:64px;height:64px;border-radius:50%;background:rgba(28,26,22,0.8);display:flex;align-items:center;justify-content:center;\"><span style=\"border-left:18px solid #F2F1EC;border-top:12px solid transparent;border-bottom:12px solid transparent;margin-left:5px;\"><\u002Fspan><\u002Fspan>\n        <span style=\"position:absolute;bottom:12px;left:14px;font-family:'Space Mono',monospace;font-size:10px;color:#99A1AE;text-transform:uppercase;\">[ feature video — founding story &amp; site walk ]<\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"exp-grid\" style=\"display:grid;grid-template-columns:1.25fr 1fr;gap:48px;margin-top:34px;align-items:start;\">\n        <div>\n          <div style=\"font-family:'Space Mono',monospace;font-size:11px;color:#7AA7DD;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:12px;\">The Journey<\u002Fdiv>\n          <p style=\"font-size:16px;line-height:1.65;color:#CDD3DD;margin:0 0 18px;\">It started as a question no one on campus was answering: who actually builds sustainably, and at scale? I founded the Sustainable Building Initiative to be that answer — and grew it into a UT Swing Out Award finalist organization.<\u002Fp>\n          <div style=\"border-left:3px solid #7AA7DD;padding:6px 0 6px 18px;margin:24px 0;\">\n            <p style=\"font-family:'Newsreader',serif;font-style:italic;font-size:20px;line-height:1.4;color:#E8EBF0;margin:0;\">\"The hardest part wasn't the engineering. It was getting 90+ people from different disciplines to move as one — and holding the line on 100% of our sustainability mandates.\"<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"font-family:'Space Mono',monospace;font-size:11px;color:#7AA7DD;letter-spacing:0.1em;text-transform:uppercase;margin:26px 0 12px;\">The Struggle &amp; The Result<\u002Fdiv>\n          <p style=\"font-size:16px;line-height:1.65;color:#CDD3DD;margin:0;\">Directing four large-scale projects at once — a ranch complex, two sustainable residences, and a 23-floor high-rise — meant constant tradeoffs between cost, schedule, and standards. We delivered $800K in sustainable construction without compromising the mission, and established an international presence by managing a $25M project pipeline.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:14px;\">\n          <div data-reveal=\"\" style=\"position:relative;aspect-ratio:4/3;border-radius:4px;overflow:hidden;background:#232B38;background-image:repeating-linear-gradient(135deg,rgba(255,255,255,0.045) 0 1px,transparent 1px 11px);display:flex;align-items:flex-end;padding:10px;\"><span style=\"font-family:'Space Mono',monospace;font-size:9px;color:#99A1AE;text-transform:uppercase;\">[ photo — team on site ]<\u002Fspan><\u002Fdiv>\n          <div data-reveal=\"\" style=\"position:relative;aspect-ratio:4/3;border-radius:4px;overflow:hidden;background:#232B38;background-image:repeating-linear-gradient(135deg,rgba(255,255,255,0.045) 0 1px,transparent 1px 11px);display:flex;align-items:flex-end;padding:10px;\"><span style=\"font-family:'Space Mono',monospace;font-size:9px;color:#99A1AE;text-transform:uppercase;\">[ doc — pipeline ledger ]<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;\">\n            <a href=\"#\" style=\"font-family:'Space Mono',monospace;font-size:11px;color:#7AA7DD;border:1px solid #7AA7DD;border-radius:30px;padding:6px 13px;text-decoration:none;\">→ project ledger<\u002Fa>\n            <a href=\"#\" style=\"font-family:'Space Mono',monospace;font-size:11px;color:#7AA7DD;border:1px solid #7AA7DD;border-radius:30px;padding:6px 13px;text-decoration:none;\">→ award note<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- builds directed under SBI -->\n      <div style=\"margin-top:52px;border-top:1px solid #2A3342;padding-top:36px;\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:11px;color:#7AA7DD;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;\">Inside the Pipeline · The Builds I Directed<\u002Fdiv>\n        <p style=\"font-size:16px;line-height:1.6;color:#99A1AE;margin:0 0 28px;max-width:66ch;\">Four large-scale projects ran under SBI — a ranch complex, two sustainable residences, and a 23-floor high-rise. I owned design and delivery on each. Two are detailed below with their own footage and artifacts.<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px;\">\n          <div data-reveal=\"\" style=\"background:#1A212D;border:1px solid #2A3342;border-radius:6px;overflow:hidden;\">\n            <div style=\"position:relative;aspect-ratio:16/9;background:#232B38;background-image:repeating-linear-gradient(135deg,rgba(255,255,255,0.045) 0 1px,transparent 1px 13px);display:flex;align-items:center;justify-content:center;\">\n              <span style=\"position:absolute;width:52px;height:52px;border-radius:50%;background:rgba(28,26,22,0.8);display:flex;align-items:center;justify-content:center;\"><span style=\"border-left:15px solid #F2F1EC;border-top:10px solid transparent;border-bottom:10px solid transparent;margin-left:4px;\"><\u002Fspan><\u002Fspan>\n              <span style=\"position:absolute;bottom:10px;left:12px;font-family:'Space Mono',monospace;font-size:9px;color:#99A1AE;text-transform:uppercase;\">[ video — Ranch design-to-build ]<\u002Fspan>\n            <\u002F mily:'Space Mono',monospace;font-size:9.5px;color:#99A1AE;text-transform:uppercase;\">Environ.<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"chart-divider\" style=\"border-left:1px solid #2A3342;padding-left:40px;display:flex;flex-direction:column;gap:24px;\">\n            <div>\n              <div style=\"display:flex;align-items:baseline;gap:3px;\"><span style=\"font-family:'Newsreader',serif;font-size:46px;color:#7AA7DD;line-height:1;\">+<span data-countup=\"\" data-to=\"14\">0<\u002Fspan><\u002Fspan><span style=\"font-family:'Newsreader',serif;font-size:26px;color:#7AA7DD;\">pts<\u002Fspan><\u002Fdiv>\n              <div style=\"font-family:'Archivo',sans-serif;font-size:12.5px;color:#99A1AE;margin-top:4px;\">avg. utilization gained<\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div style=\"display:flex;align-items:baseline;gap:3px;\"><span style=\"font-family:'Newsreader',serif;font-size:46px;color:#CBA968;line-height:1;\">−<span data-countup=\"\" data-to=\"9\">0<\u002Fspan><\u002Fspan><span style=\"font-family:'Newsreader',serif;font-size:26px;color:#CBA968;\">%<\u002Fspan><\u002Fdiv>\n              <div style=\"font-family:'Archivo',sans-serif;font-size:12.5px;color:#99A1AE;margin-top:4px;\">overhead reduced<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-family:'Space Mono',monospace;font-size:9.5px;color:#7D838D;text-transform:uppercase;letter-spacing:0.05em;margin-top:22px;\">↳ illustrative — replace with your actual figures<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 02 RISK MANAGEMENT -->\n      <div id=\"fni-risk-mgmt\" data-reveal=\"\" style=\"margin-top:60px;padding-top:34px;border-top:1px solid #2A3342;display:flex;align-items:baseline;gap:18px;\">\n        <span style=\"font-family:'Newsreader',serif;font-size:32px;color:#7AA7DD;line-height:1;\">02<\u002Fspan>\n        <div>\n          <div style=\"font-family:'Space Mono',monospace;font-size:10.5px;color:#CBA968;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:5px;\">Risk &amp; Reliability · Texas River Authority<\u002Fdiv>\n          <h3 style=\"font-family:'Newsreader',serif;font-weight:500;font-size:clamp(24px,3vw,34px);line-height:1.05;margin:0;\">Canal Failure Prediction System<\u002Fh3>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"exp-grid\" style=\"display:grid;grid-template-columns:1.25fr 1fr;gap:48px;margin-top:30px;align-items:start;\">\n        <div>\n          <div style=\"font-family:'Space Mono',monospace;font-size:11px;color:#7AA7DD;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:12px;\">The Journey<\u002Fdiv>\n          <p style=\"font-size:16px;line-height:1.65;color:#CDD3DD;margin:0 0 18px;\">I'm building a risk-prediction system for a major Texas river authority's canal network from the ground up — starting from the first principle of risk itself: <strong style=\"color:#E8EBF0;\">Risk = Likelihood × Consequence<\u002Fstrong>.<\u002Fp>\n          <p style=\"font-size:16px;line-height:1.65;color:#CDD3DD;margin:0 0 18px;\">From there I define every factor we believe drives likelihood and every factor that drives consequence — deliberately stopping before the model gets so granular it stops being useful. The system resolves those factors into a single risk surface and renders it as a heat map overlaid on the authority's GIS data, so the highest-priority Potential Failure Modes (PFMs) surface exactly where they sit on the network.<\u002Fp>\n          <div style=\"border-left:3px solid #7AA7DD;padding:6px 0 6px 18px;margin:24px 0;\">\n            <p style=\"font-family:'Newsreader',serif;font-style:italic;font-size:20px;line-height:1.4;color:#E8EBF0;margin:0;\">\"Most river-system failures are unforeseen — by the time there's a visible sign, the cheap fix is already gone.\"<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"font-family:'Space Mono',monospace;font-size:11px;color:#7AA7DD;letter-spacing:0.1em;text-transform:uppercase;margin:26px 0 12px;\">The Struggle &amp; The Result<\u002Fdiv>\n          <p style=\"font-size:16px;line-height:1.65;color:#CDD3DD;margin:0;\">River systems fail expensively. Failures tend to show signs only once it's already too late to address them cheaply, turning routine maintenance into emergency repair. By surfacing where failure is both most likely and most costly <em style=\"color:#E8EBF0;font-style:italic;\">before<\u002Fem> it happens, the system shifts budget from reactive repair to targeted prevention.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:14px;\">\n          <div data-reveal=\"\" style=\"position:relative;aspect-ratio:4/3;border-radius:4px;overflow:hidden;background:#232B38;background-image:repeating-linear-gradient(135deg,rgba(255,255,255,0.045) 0 1px,transparent 1px 11px);display:flex;align-items:flex-end;padding:10px;\"><span style=\"font-family:'Space Mono',monospace;font-size:9px;color:#99A1AE;text-transform:uppercase;\">[ map — GIS risk heat overlay ]<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;\">\n            <a href=\"#\" style=\"font-family:'Space Mono',monospace;font-size:11px;color:#7AA7DD;border:1px solid #7AA7DD;border-radius:30px;padding:6px 13px;text-decoration:none;\">→ system overview<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- risk matrix -->\n      <div data-reveal=\"\" style=\"margin-top:34px;background:#1A212D;border:1px solid #2A3342;border-radius:8px;padding:30px 32px;\">\n        <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:24px;\">\n          <div style=\"font-family:'Space Mono',monospace;font-size:11px;color:#CBA968;letter-spacing:0.1em;text-transform:uppercase;\">Risk = Likelihood × Consequence<\u002Fdiv>\n          <div style=\"display:flex;gap:16px;a ;font-family:'Space Mono',monospace;font-size:10px;color:#8B93A0;\">5<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"text-align:center;font-family:'Space Mono',monospace;font-size:10px;color:#99A1AE;letter-spacing:0.12em;text-transform:uppercase;margin-top:8px;\">Likelihood →<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-family:'Space Mono',monospace;font-size:9.5px;color:#7D838D;text-transform:uppercase;letter-spacing:0.05em;margin-top:20px;\">↳ ringed cells = PFMs flagged for the network and pinned on the GIS heat map<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 03 RISK MITIGATION -->\n      <div id=\"fni-risk-mit\" data-reveal=\"\" style=\"margin-top:60px;padding-top:34px;border-top:1px solid #2A3342;display:flex;align-items:baseline;gap:18px;\">\n        <span style=\"font-family:'Newsreader',serif;font-size:32px;color:#7AA7DD;line-height:1;\">03<\u002Fspan>\n        <div>\n          <div style=\"font-family:'Space Mono',monospace;font-size:10.5px;color:#CBA968;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:5px;\">Risk Mitigation · Claims &amp; Communication<\u002Fdiv>\n          <h3 style=\"font-family:'Newsreader',serif;font-weight:500;font-size:clamp(24px,3vw,34px);line-height:1.05;margin:0;\">Email Practices as Legal Liability<\u002Fh3>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"exp-grid\" style=\"display:grid;grid-template-columns:1.25fr 1fr;gap:48px;margin-top:30px;align-items:start;\">\n        <div>\n          <div style=\"font-family:'Space Mono',monospace;font-size:11px;color:#7AA7DD;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:12px;\">The Journey<\u002Fdiv>\n          <p style=\"font-size:16px;line-height:1.65;color:#CDD3DD;margin:0 0 18px;\">I analyzed a claim brought against the firm that traced back to poor email practices — long, stringy threads that kept growing without anyone stepping back to read them as a whole.<\u002Fp>\n          <div style=\"border-left:3px solid #7AA7DD;padding:6px 0 6px 18px;margin:24px 0;\">\n            <p style=\"font-family:'Newsreader',serif;font-style:italic;font-size:20px;line-height:1.4;color:#E8EBF0;margin:0;\">\"What the team intended as a private, helpful debate with the client became the single strongest exhibit against us.\"<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"font-family:'Space Mono',monospace;font-size:11px;color:#7AA7DD;letter-spacing:0.1em;text-transform:uppercase;margin:26px 0 12px;\">The Struggle &amp; The Result<\u002Fdiv>\n          <p style=\"font-size:16px;line-height:1.65;color:#CDD3DD;margin:0 0 18px;\">A lengthy email string is a documented conversation — and a documented conversation can be used against you. In a recent claim, a contractor obtained our client emails through discovery and turned our own words into a central argument against our case.<\u002Fp>\n          <p style=\"font-size:16px;line-height:1.65;color:#CDD3DD;margin:0;\">So I turned the post-mortem into an educational program built to reach all <strong style=\"color:#E8EBF0;\">1,500 people<\u002Fstrong> at the firm: healthy communication practices delivered across formats — a presentation rebuilt on FNI's official template, live meetings, and group sessions — so the lesson actually changes behavior instead of sitting in a folder.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:14px;\">\n          <div data-reveal=\"\" style=\"background:#1A212D;border:1px solid #2A3342;border-radius:6px;padding:18px;\">\n            <div style=\"font-family:'Space Mono',monospace;font-size:9px;color:#99A1AE;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px;\">RE: RE: RE: FW: clarification — thread (47)<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:7px;\">\n              <div style=\"border-left:2px solid #3a4759;padding-left:10px;font-family:'Space Mono',monospace;font-size:10.5px;color:#8B93A0;line-height:1.4;\">&gt; client raised a scope question…<\u002Fdiv>\n              <div style=\"border-left:2px solid #4a5a72;padding-left:10px;margin-left:12px;font-family:'Space Mono',monospace;font-size:10.5px;color:#9AA3B0;line-height:1.4;\">&gt;&gt; we don't believe that's on us…<\u002Fdiv>\n              <div style=\"border-left:2px solid #5b6f8c;padding-left:10px;margin-left:24px;font-family:'Space Mono',monospace;font-size:10.5px;color:#AEB6C2;line-height:1.4;\">&gt;&gt;&gt; internally — let's push back hard…<\u002Fdiv>\n              <div style=\"border-left:2px solid #a83b3b;padding-left:10px;margin-left:36px;font-family:'Space Mono',monospace;font-size:10.5px;color:#d98b8b;line-height:1.4;\">&gt;&gt;&gt;&gt; \"their design was the real problem\"<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"margin-top:13px;\"><span style=\"display:inline-block;background:#a83b3b;color:#fff;font-family:'Space Mono',monospace;font-size:9px;padding:3px 9px;border-radius:30px;text-transform:uppercase;letter-spacing:0.05em;\">⚠ obtained via discovery<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div data-reveal=\"\" style=\"background:#1A212D;border:1px solid #2A3342;border-radius:6px;padding:18px 20px;\">\n            <div style=\"display:flex;align-items:baseline;gap:3px;\"><span style=\"font-family:'Newsreader',serif;font-size:46px;color:#7AA7DD;line-height:1;\"><span data-countup=\"\" data-to=\"1500\">0<\u002Fspan><\u002Fspan><\u002Fdiv>\n            <div style=\"font-family:'Archivo',sans-serif;font-size:12.5px;color:#99A1AE;margin-top:4px;\">employees reached firm-wide<\u002Fdiv>\n            <div style=\"display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;\">\n              <span style=\"font-family:'Space Mono',monospace;font-size:10px;color:#D4D9E2;background:#232B38;border-radius:30px;padding:3px 10px;\">Presentation<\u002Fspan>\n              <span style=\"font-family:'Space Mono',monospace;font-size:10px;color:#D4D9E2;background:#232B38;border-radius:30px;padding:3px 10px;\">Meetings<\u002Fspan>\n              <span style=\"font-family:'Space Mono',monospace;font-size:10px;color:#D4D9E2;background:#232B38;border-radius:30px;padding:3px 10px;\">Group sessions<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-top:2px;\">\n            <a href=\"#\" style=\"font-family:'Space Mono',monospace;font-size:11px;color:#7AA7DD;border:1px solid #7AA7DD;border-radius:30px;padding:6px 13px;text-decoration:none;\">→ training deck<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- 05 ICELIS -->\n  <div id=\"icelis\" data-exp=\"\" style=\"border-top:1px solid #2A3342;background:#151B25;\">\n    <div style=\"max-width:1100px;margin:0 auto;padding:72px 32px 80px;\">\n      <a href=\"#pipeline\" style=\"font-family:'Space Mono',monospace;font-size:11px;color:#8B93A0;text-decoration:none;letter-spacing:0.06em;\">↑ BACK TO PIPELINE<\u002Fa>\n      <div style=\"display:flex;align-items:flex-start;gap:24px;margin-top:24px;\">\n        <div style=\"font-family:'Newsreader',serif;font-size:72px;line-height:0.8;color:#7AA7DD;\">05<\u002Fdiv>\n        <div>\n          <div style=\"font-family:'Space Mono',monospace;font-size:11px;color:#CBA968;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;\">ESG &amp; Systems Development Intern · Jan – Aug 2025<\u002Fdiv>\n          <h2 style=\"font-family:'Newsreader',serif;font-weight:400;font-size:clamp(32px,4.4vw,52px);line-height:1.04;margin:0;max-width:20ch;\">Icelis Global<\u002Fh2>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" style=\"position:relative;width:100%;aspect-ratio:16/9;border-radius:5px;overflow:hidden;background:#232B38;background-image:repeating-linear-gradient(135deg,rgba(255,255,255,0.045) 0 1px,transparent 1px 13px);display:flex;align-items:center;justify-content:center;margin:36px 0 14px;box-shadow:0 llable hours were submitted on trust and ran inflated. The systems I built to capture and analyze real activity gave leadership evidence-backed visibility into where time was actually spent — cutting logged hours 23% on day one and settling near a 28% reduction as only genuinely billable time was counted. Alongside it, I restructured the Environmental Master Folder to ISO-certification readiness.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:14px;\">\n          <div data-reveal=\"\" style=\"position:relative;aspect-ratio:4/3;border-radius:4px;overflow:hidden;background:#232B38;background-image:repeating-linear-gradient(135deg,rgba(255,255,255,0.045) 0 1px,transparent 1px 11px);display:flex;align-items:flex-end;padding:10px;\"><span style=\"font-family:'Space Mono',monospace;font-size:9px;color:#99A1AE;text-transform:uppercase;\">[ screenshot — ESG module ]<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;\">\n            <a href=\"#\" style=\"font-family:'Space Mono',monospace;font-size:11px;color:#7AA7DD;border:1px solid #7AA7DD;border-radius:30px;padding:6px 13px;text-decoration:none;\">→ tool overview<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- impact: billable hours line chart -->\n      <div data-reveal=\"\" style=\"margin-top:44px;background:#1A212D;border:1px solid #2A3342;border-radius:8px;padding:30px 32px;\">\n        <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:8px;\">\n          <div style=\"font-family:'Space Mono',monospace;font-size:11px;color:#CBA968;letter-spacing:0.1em;text-transform:uppercase;\" data-comment-anchor=\"51da92de38-div\">Company-wide logged hours · before vs. after<\u002Fdiv>\n          <div style=\"display:flex;gap:18px;align-items:center;font-family:'Space Mono',monospace;font-size:10px;color:#8B93A0;text-transform:uppercase;lette ttom:24px;\">What the trend means<\u002Fdiv>\n        <div class=\"chart2col\" style=\"display:grid;grid-template-columns:1.5fr 1fr;gap:44px;align-items:center;\">\n          <div>\n            <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:16px;\">\n              <span style=\"width:96px;font-family:'Space Mono',monospace;font-size:10px;color:#8B93A0;text-transform:uppercase;text-align:right;line-height:1.3;\">Day-one drop<\u002Fspan>\n              <div style=\"flex:1;height:26px;background:#10141C;border-radius:4px;overflow:hidden;\"><div class=\"barfill\" style=\"width:23%;height:100%;background:#5b86c4;border-radius:4px;\"><\u002Fdiv><\u002Fdiv>\n              <span style=\"width:54px;font-family:'Space Mono',monospace;font-size:13px;color:#CDD3DD;\"><span data-countup=\"\" data-to=\"23\" data-suffix=\"%\">0%<\u002Fspan><\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:14px;\">\n              <span style=\"width:96px;font-family:'Space Mono',monospace;font-size:10px;color:#8B93A0;text-transform:uppercase;text-align:right;line-height:1.3;\">Stabilized<\u002Fspan>\n              <div style=\"flex:1;height:26px;background:#10141C;border-radius:4px;overflow:hidden;\"><div class=\"barfill\" style=\"width:28%;height:100%;background:linear-gradient(90deg,#5b86c4,#7AA7DD);border-radius:4px;transition-delay:.25s;\"><\u002Fdiv><\u002Fdiv>\n              <span style=\"width:54px;font-family:'Space Mono',monospace;font-size:13px;color:#7AA7DD;font-weight:700;\"><span data-countup=\"\" data-to=\"28\" data-suffix=\"%\">0%<\u002Fspan><\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"chart-divider\" style=\"border-left:1px solid #2A3342;padding-left:40px;\">\n            <div style=\"display:flex;align-items:baseline;gap:3px;\"><span style=\"font-family:'Newsreader',serif;font-size:52px;color:#7AA7DD;line-height:1;\">~<span data-countup=\"\" data-to=\"28\">0<\u002Fspan><\u002Fspan><span style=\"font-family:'Newsreader',serif;font-size:30px;color:#7AA7DD;\">%<\u002Fspan><\u002Fdiv>\n            <div style=\"font-family:'Archivo',sans-serif;font-size:13px;color:#CDD3DD;margin-top:6px;line-height:1.45;\">of logged hours were non-billable — now eliminated and evidence-backed.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- 06 RESEARCH -->\n  <div id=\"research\" data-exp=\"\" style=\"border-top:1px solid #2A3342;background:#10141C;\">\n    <div style=\"max-width:1100px;margin:0 auto;padding:72px 32px 80px;\">\n      <a href=\"#pipeline\" style=\"font-family:'Space Mono',monospace;font-size:11px;color:#8B93A0;text-decoration:none;letter-spacing:0.06em;\">↑ BACK TO PIPELINE<\u002Fa>\n      <div style=\"display:flex;align-items:flex-start;gap:24px;margin-top:24px;\">\n        <div style=\"font-family:'Newsreader',serif;font-size:72px;line-height:0.8;color:#7AA7DD;\">06<\u002Fdiv>\n        <div>\n          <div style=\"font-family:'Space Mono',monospace;font-size:11px;color:#CBA968;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;\">Undergraduate Geotechnical Fellow · Research<\u002Fdiv>\n          <h2 style=\"font-family:'Newsreader',serif;font-weight:400;font-size:clamp(32px,4.4vw,52px);line-height:1.04;margin:0;max-width:22ch;\">Geotechnical Research — Geosynthetic Textiles<\u002Fh2>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" style=\"position:relative;width:100%;aspect-ratio:16/9;border-radius:5px;overflow:hidden;background:#232B38;background-image:repeating-linear-gradient(135deg,rgba(255,255,255,0.045) 0 1px,transparent 1px 13px);display:flex;align-items:center;justify-content:center;margin:36px 0 14px;box-shadow:0 24px 50px -34px rgba(28,26,22,0.6);\"><span style=\"position:absolute;width:64px;height:64px;border-radius:50%;background:rgba(16,20,28,0.8);display:flex;align-items:center;justify-content:center;\"><span style=\"border-left:18px solid #F2F1EC;border-top:12px solid transparent;border-bottom:12px solid transparent;margin-left:5px;\"><\u002Fspan><\u002Fspan><span style=\"position:absolute;bottom:12px;left:14px;font-family:'Space Mono',monospace;font-size:10px;color:#99A1AE;text-transform:uppercase;\">[ feature video — frame-by-frame experiment footage ]<\u002Fspan><\u002Fdiv>\n      <p style=\"font-size:16px;line-height:1.65;color:#CDD3DD;margin:18px 0 0;max-width:74ch;\">My work centered on the geosynthetic fabric itself — how it moves and holds water. The fellowship's bigger contribution was re-engineering <em style=\"color:#E8EBF0;font-style:normal;font-weight:600;\">how the data was captured<\u002Fem>, replacing variable, human-timed readings with continuous, instrument-grade measurement.<\u002Fp>\n\n      <!-- Sub-project A -->\n      <div style=\"margin-top:52px;border-top:1px solid #1c2531;padding-top:38px;\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:11px;color:#7AA7DD;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:14px;\">01 · Automated Water-Siphoning Rig<\u002Fdiv>\n        <div class=\"exp-grid\" style=\"display:grid;grid-template-columns:1.25fr 1fr;gap:48px;align-items:start;\">\n          <div>\n            <p style=\"font-size:15.5px;line-height:1.65;color:#CDD3DD;margin:0 0 16px;\">Inside a temperature- and humidity-controlled chamber, a water-filled beaker sat on one scale with a textile strip dipped in it; the fabric siphoned water into a second, empty beaker on its own scale. Rather than send someone to photograph the scales three times a day — introducing timing variability every reading — I mounted a GoPro to the chamber's glass panel to record continuously, then wrote a script that stripped the footage frame by frame into a mass-change time-series for both beakers.<\u002Fp>\n            <div style=\"border-left:3px solid #7AA7DD;padding:4px 0 4px 18px;margin:22px 0;\">\n              <p style=\"font-family:'Newsreader',serif;font-style:italic;font-size:19px;line-height:1.4;color:#E8EBF0;margin:0;\">\"One camera turned an experiment someone had to babysit into a dataset that recorded itself.\"<\u002Fp>\n            <\u002Fdiv>\n            <table style=\"width:100%;border-collapse:collapse;font-family:'Archivo',sans-serif;margin-top:6px;\">\n  <thead><tr><th style=\"text-align:left;font-family:'Space Mono',monospace;font-size:9.5px;letter-spacing:0.06em;text-transform:uppercase;color:#7E8590;font-weight:400;padding:0 14px 11px 0;border-bottom:1px solid #2A3342;\">Metric<\u002Fth><th style=\"text-align:left;font-family:'Space Mono',monospace;font-size:9.5px;letter-spacing:0.06em;text-transform:uppercase;color:#7E8590;font-weight:400;padding:0 14px 11px 0;border-bottom:1px solid #2A3342;\">Manual method<\u002Fth><th style=\"text-align:left;font-family:'Space Mono',monospace;font-size:9.5px;letter-spacing:0.06em;text-transform:uppercase;color:#7AA7DD;font-weight:400;padding:0 14px 11px 0;border-bottom:1px solid #2A3342;\">Automated rig<\u002Fth><\u002Ftr><\u002Fthead>\n  <tbody><tr><td style=\"padding:11px 14px 11px 0;border-bottom:1px solid #1c2531;font-size:13px;color:#99A1AE;\">Capture frequency<\u002Ftd><td style=\"padding:11px 14px 11px 0;border-bottom:1px solid #1c2531;font-size:13px;color:#CDD3DD;\">3× per day<\u002Ftd><td style=\"padding:11px 14px 11px 0;border-bottom:1px solid #1c2531;font-size:13px;color:#E8EBF0;font-weight:600;\">24/7 continuous<\u002Ftd><\u002Ftr><tr><td style=\"padding:11px 14px 11px 0;border-bottom:1px solid #1c2531;font-size:13px;color:#99A1AE;\">Reading source<\u002Ftd><td style=\"padding:11px 14px 11px 0;border-bottom:1px solid #1c2531;font-size:13px;color:#CDD3DD;\">Hand photo, lab visit<\u002Ftd><td style=\"padding:11px 14px 11px 0;border-bottom:1px solid #1c2531;font-size:13px;color:#E8EBF0;font-weight:600;\">GoPro, frame-by-frame<\u002Ftd><\u002Ftr><tr><td style=\"padding:11px 14px 11px 0;border-bottom:1px solid #1c2531;font-size:13px;color:#99A1AE;\">Timing variability<\u002Ftd><td style=\"padding:11px 14px 11px 0;border-bottom:1px solid #1c2531;font-size:13px;color:#CDD3DD;\">High — human-dependent<\u002Ftd><td style=\"padding:11px 14px 11px 0;border-bottom:1px solid #1c2531;font-size:13px;color:#E8EBF0;font-weight:600;\">Removed — fixed interval<\u002Ftd><\u002Ftr><tr><td style=\"padding:11px 14px 11px 0;border-bottom:1px solid #1c2531;font-size:13px;color:#99A1AE;\">Environment<\u002Ftd><td style=\"padding:11px 14px 11px 0;border-bottom:1px solid #1c2531;font-size:13px;color:#CDD3DD;\">Open bench<\u002Ftd><td style=\"padding:11px 14px 11px 0;border-bottom:1px solid #1c2531;font-size:13px;color:#E8EBF0;font-weight:600;\">Temp- &amp; humidity-controlled<\u002Ftd><\u002Ftr><tr><td style=\"padding:11px 14px 11px 0;border-bottom:1px solid transparent;font-size:13px;color:#99A1AE;\">Output<\u002Ftd><td style=\"padding:11px 14px 11px 0;border-bottom:1px solid transparent;font-size:13px;color:#CDD3DD;\">Sparse spot readings<\u002Ftd><td style=\"padding:11px 14px 11px 0;border-bottom:1px solid transparent;font-size:13px;color:#E8EBF0;font-weight:600;\">Per-frame mass time-series<\u002Ftd><\u002Ftr><\u002Ftbody>\n<\u002Ftable>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:14px;\">\n            <div data-reveal=\"\" style=\"position:relative;aspect-ratio:4/3;border-radius:4px;overflow:hidden;background:#232B38;background-image:repeating-linear-gradient(135deg,rgba(255,255,255,0.045) 0 1px,transparent 1px 11px);display:flex;align-items:flex-end;padding:10px;\"><span style=\"font-family:'Space Mono',monospace;font-size:9px;color:#99A1AE;text-transform:uppercase;\">[ photo — dual-beaker siphon rig on scales ]<\u002Fspan><\u002Fdiv>\n            <div data-reveal=\"\" style=\"position:relative;aspect-ratio:4/3;border-radius:4px;overflow:hidden;background:#232B38;background-image:repeating-linear-gradient(135deg,rgba(255,255,255,0.045) 0 1px,transparent 1px 11px);display:flex;align-items:flex-end;padding:10px;\"><span style=\"font-family:'Space Mono',monospace;font-size:9px;color:#99A1AE;text-transform:uppercase;\">[ frame — GoPro mass-change capture ]<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- impact A -->\n        <div data-reveal=\"\" style=\"margin-top:30px;background:#151B25;border:1px solid #2A3342;border-radius:8px;padding:28px 32px;\">\n          <div style=\"font-family:'Space Mono',monospace;font-size:11px;color:#CBA968;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:22px;\">Measured Impact<\u002Fdiv>\n          <div class=\"chart2col\" style=\"display:grid;grid-template-columns:1.55fr 1fr;gap:44px;align-items:center;\">\n            <div>\n              <div style=\"font-family:'Archivo',sans-serif;font-size:13px;color:#99A1AE;margin-bottom:18px;\">Data-capture frequency<\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:14px;\">\n                <span style=\"width:78px;font-family:'Space Mono',monospace;font-size:10px;color:#8B93A0;text-transform:uppercase;text-align:right;\">Manual<\u002Fspan>\n                <div style=\"flex:1;height:26px;background:#10141C;border-radius:4px;overflow:hidden;\"><div class=\"barfill\" style=\"width:5%;height:100%;background:#3a4759;border-radius:4px;\"><\u002Fdiv><\u002Fdiv>\n                <span style=\"width:78px;font-family:'Space Mono',monospace;font-size:12px;color:#CDD3DD;\">3× / day<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:14px;\">\n                <span style=\"width:78px;font-family:'Space Mono',monospace;font-size:10px;color:#8B93A0;text-transform:uppercase;text-align:right;\">Automated<\u002Fspan>\n                <div style=\"flex:1;height:26px;background:#10141C;border-radius:4px;overflow:hidden;\"><div class=\"barfill\" style=\"width:100%;height:100%;background:linear-gradient(90deg,#5b86c4,#7AA7DD);border-radius:4px;transition-delay:.22s;\"><\u002Fdiv><\u002Fdiv>\n                <span style=\"width:78px;font-family:'Space Mono',monospace;font-size:12px;color:#7AA7DD;font-weight:700;\">24 / 7<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"chart-divider\" style=\"border-left:1px solid #2A3342;padding-left:40px;\">\n              <div style=\"font-family:'Newsreader',serif;font-size:48px;color:#7AA7DD;line-height:1;\">24/7<\u002Fdiv>\n              <div style=\"font-family:'Archivo',sans-serif;font-size:13px;color:#CDD3DD;margin-top:6px;line-height:1.45;\">continuous capture, up from 3 readings a day — no human in the loop.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Sub-project B -->\n      <div style=\"margin-top:48px;border-top:1px solid #1c2531;padding-top:38px;\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:11px;color:#7AA7DD;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:14px;\">02 · Capillary-Rise Thermal Monitoring<\u002Fdiv>\n        <div class=\"exp-grid\" style=\"display:grid;grid-template-columns:1.25fr 1fr;gap:48px;align-items:start;\">\n          <div>\n            <p style=\"font-size:15.5px;line-height:1.65;color:#CDD3DD;margin:0 0 16px;\">When the capillary-rise study passed to me, the standard method was eyeballing the highest point the water reached — far too subjective — and adding dye, which itself altered absorption at the microscopic scale and skewed the result. I requested a thermal camera and tracked the temperature differential instead, letting me watch capillary rise climb the textile vertically in real time, without touching the sample. Average reading precision improved by more than 60%.<\u002Fp>\n            <div style=\"border-left:3px solid #7AA7DD;padding:4px 0 4px 18px;margin:22px 0;\">\n              <p style=\"font-family:'Newsreader',serif;font-style:italic;font-size:19px;line-height:1.4;color:#E8EBF0;margin:0;\">\"The dye we used to see the water was the very thing changing how it moved. Heat let me measure without interfering.\"<\u002Fp>\n            <\u002Fdiv>\n            <table style=\"width:100%;border-collapse:collapse;font-family:'Archivo',sans-serif;margin-top:6px;\">\n  <thead><tr><th style=\"text-align:left;font-family:'Space Mono',monospace;font-size:9.5px;letter-spacing:0.06em;text-transform:uppercase;color:#7E8590;font-weight:400;padding:0 14px 11px 0;border-bottom:1px solid #2A3342;\">Metric<\u002Fth><th style=\"text-align:left;font-family:'Space Mono',monospace;font-size:9.5px;letter-spacing:0.06em;text-transform:uppercase;color:#7E8590;font-weight:400;padding:0 14px 11px 0;border-bottom:1px solid #2A3342;\">Eyeball + dye<\u002Fth><th style=\"text-align:left;font-family:'Space Mono',monospace;font-size:9.5px;letter-spacing:0.06em;text-transform:uppercase;color:#7AA7DD;font-weight:400;padding:0 14px 11px 0;border-bottom:1px solid #2A3342;\">Thermal camera<\u002Fth><\u002Ftr><\u002Fthead>\n  <tbody><tr><td style=\"padding:11px 14px 11px 0;border-bottom:1px solid #1c2531;font-size:13px;color:#99A1AE;\">Reading method<\u002Ftd><td style=\"padding:11px 14px 11px 0;border-bottom:1px solid #1c2531;font-size:13px;color:#CDD3DD;\">Visual highest point<\u002Ftd><td style=\"padding:11px 14px 11px 0;border-bottom:1px solid #1c2531;font-size:13px;color:#E8EBF0;font-weight:600;\">Temperature gradient<\u002Ftd><\u002Ftr><tr><td style=\"padding:11px 14px 11px 0;border-bottom:1px solid #1c2531;font-size:13px;color:#99A1AE;\">Sample interference<\u002Ftd><td style=\"padding:11px 14px 11px 0;border-bottom:1px solid #1c2531;font-size:13px;color:#CDD3DD;\">Dye alters absorption<\u002Ftd><td style=\"padding:11px 14px 11px 0;border-bottom:1px solid #1c2531;font-size:13px;color:#E8EBF0;font-weight:600;\">None — non-contact<\u002Ftd><\u002Ftr><tr><td style=\"padding:11px 14px 11px 0;border-bottom:1px solid #1c2531;font-size:13px;color:#99A1AE;\">Tracking<\u002Ftd><td style=\"padding:11px 14px 11px 0;border-bottom:1px solid #1c2531;font-size:13px;color:#CDD3DD;\">Single endpoint<\u002Ftd><td style=\"padding:11px 14px 11px 0;border-bottom:1px solid #1c2531;font-size:13px;color:#E8EBF0;font-weight:600;\">Live vertical rise<\u002Ftd><\u002Ftr><tr><td style=\"padding:11px 14px 11px 0;border-bottom:1px solid transparent;font-size:13px;color:#99A1AE;\">Avg. precision<\u002Ftd><td style=\"padding:11px 14px 11px 0;border-bottom:1px solid transparent;font-size:13px;color:#CDD3DD;\">Baseline<\u002Ftd><td style=\"padding:11px 14px 11px 0;border-bottom:1px solid transparent;font-size:13px;color:#E8EBF0;font-weight:600;\">+60% on average<\u002Ftd><\u002Ftr><\u002Ftbody>\n<\u002Ftable>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:14px;\">\n            <div data-reveal=\"\" style=\"position:relative;aspect-ratio:4/3;border-radius:4px;overflow:hidden;background:#232B38;background-image:repeating-linear-gradient(135deg,rgba(255,255,255,0.045) 0 1px,transparent 1px 11px);display:flex;align-items:flex-end;padding:10px;\"><span style=\"font-family:'Space Mono',monospace;font-size:9px;color:#99A1AE;text-transform:uppercase;\">[ thermal — capillary rise gradient ]<\u002Fspan><\u002Fdiv>\n            <div data-reveal=\"\" style=\"position:relative;aspect-ratio:4/3;border-radius:4px;overflow:hidden;background:#232B38;background-image:repeating-linear-gradient(135deg,rgba(255,255,255,0.045) 0 1px,transparent 1px 11px);display:flex;align-items:flex-end;padding:10px;\"><span style=\"font-family:'Space Mono',monospace;font-size:9px;color:#99A1AE;text-transform:uppercase;\">[ photo — thermal camera setup ]<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- impact B -->\n        <div data-reveal=\"\" style=\"margin-top:30px;background:#151B25;border:1px solid #2A3342;border-radius:8px;padding:28px 32px;\">\n          <div style=\"font-family:'Space Mono',monospace;font-size:11px;color:#CBA968;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:22px;\">Measured Impact<\u002Fdiv>\n          <div class=\"chart2col\" style=\"display:grid;grid-template-columns:1.55fr 1fr;gap:44px;align-items:center;\">\n            <div>\n              <div style=\"font-family:'Archivo',sans-serif;font-size:13px;color:#99A1AE;margin-bottom:18px;\">Reading precision vs. eyeball + dye baseline<\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:14px;\">\n                <span style=\"width:78px;font-family:'Space Mono',monospace;font-size:10px;color:#8B93A0;text-transform:uppercase;text-align:right;\">Baseline<\u002Fspan>\n                <div style=\"flex:1;height:26px;background:#10141C;border-radius:4px;overflow:hidden;\"><div class=\"barfill\" style=\"width:40%;height:100%;background:#3a4759;border-radius:4px;\"><\u002Fdiv><\u002Fdiv>\n                <span style=\"width:54px;font-family:'Space Mono',monospace;font-size:12px;color:#CDD3DD;\">1.0×<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:14px;\">\n                <span style=\"width:78px;font-family:'Space Mono',monospace;font-size:10px;color:#8B93A0;text-transform:uppercase;text-align:right;\">Thermal<\u002Fspan>\n                <div style=\"flex:1;height:26px;background:#10141C;border-radius:4px;overflow:hidden;\"><div class=\"barfill\" style=\"width:64%;height:100%;background:linear-gradient(90deg,#5b86c4,#7AA7DD);border-radius:4px;transition-delay:.22s;\"><\u002Fdiv><\u002Fdiv>\n                <span style=\"width:54px;font-family:'Space Mono',monospace;font-size:12px;color:#7AA7DD;font-weight:700;\">1.6×<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"chart-divider\" style=\"border-left:1px solid #2A3342;padding-left:40px;\">\n              <div style=\"display:flex;align-items:baseline;gap:3px;\"><span style=\"font-family:'Newsreader',serif;font-size:52px;color:#7AA7DD;line-height:1;\">+<span data-countup=\"\" data-to=\"60\">0<\u002Fspan><\u002Fspan><span style=\"font-family:'Newsreader',serif;font-size:30px;color:#7AA7DD;\">%<\u002Fspan><\u002Fdiv>\n              <div style=\"font-family:'Archivo',sans-serif;font-size:13px;color:#CDD3DD;margin-top:6px;line-height:1.45;\">average precision gain, with zero sample interference.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== CREDENTIALS STRIP ===== -->\n  <div style=\"border-top:1px solid #2A3342;background:#10141C;\">\n    <div style=\"max-width:1100px;margin:0 auto;padding:60px 32px;display:grid;grid-template-columns:1fr 1fr;gap:44px;\">\n      <div>\n        <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.12em;color:#8B93A0;text-transform:uppercase;border-bottom:1px solid #2A3342;padding-bottom:8px;margin-bottom:14px;\">Foundation<\u002Fdiv>\n        <p style=\"font-size:15px;line-height:1.6;color:#CDD3DD;margin:0;\"><strong>UT Austin<\u002Fstrong> — B.S. Civil Engineering · Concentrations: Law &amp; Global Sustainability · Exp. May 2028 · GPA 3.76 · Dean's List.<\u002Fp>\n        <p style=\"font-size:13.5px;line-height:1.55;color:#8B93A0;margin:12px 0 0;\"><strong style=\"color:#D4D9E2;\">Texas Commission on Environmental Quality<\u002Fstrong> — Environmental Quality Externship (2024–25): conducted water-quality compliance testing and shadowed air-quality, landfill, and wastewater regulation.<\u002Fp>\n        <p style=\"font-size:13.5px;color:#8B93A0;margin:12px 0 0;\">Forbes 30 &amp; Under Summit Nominee (2025) · Undergraduate Research Fellowship in Geotechnical Engineering (2025).<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.12em;color:#8B93A0;text-transform:uppercase;border-bottom:1px solid #2A3342;padding-bottom:8px;margin-bottom:14px;\">Toolkit<\u002Fdiv>\n        <p style=\"font-size:14px;line-height:1.7;color:#CDD3DD;margin:0;\">Python (pandas · NumPy · scikit-learn · OpenCV · PyTorch) · SQL · Advanced Excel &amp; financial modeling (DCF / LBO) · Bloomberg (BMC) · Revit · Rhino 3D · InfraWorks · Bluebeam.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== FOOTER ===== -->\n  <div style=\"background:#161C27;color:#A7ADB7;\">\n    <div style=\"max-width:1100px;margin:0 auto;padding:52px 32px;display:flex;justify-content:space-between;align-items:flex-end;gap:24px;flex-wrap:wrap;\">\n      <div>\n        <div style=\"font-family:'Newsreader',serif;font-size:28px;color:#F2F1EC;margin-bottom:8px;\">Let's talk.<\u002Fdiv>\n        <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.06em;color:#7E8590;\">PEDRO XAVIER GUZMAN · AUSTIN, TX · +1 (713) 929-0180 · [email protected]<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:10px;flex-wrap:wrap;\">\n        <a href=\"mailto:[email protected]\" style=\"font-family:'Archivo',sans-serif;font-size:12.5px;font-weight:600;color:#11161F;background:#C6A567;border-radius:40px;padding:10px 18px;text-decoration:none;\">Email me<\u002Fa>\n        <a href=\"https://linkedin.com/in/pedroxguzman\" target=\"_blank\" style=\"font-family:'Archivo',sans-serif;font-size:12.5px;font-weight:600;color:#F2F1EC;border:1px solid #2A3342;border-radius:40px;padding:10px 18px;text-decoration:none;\">LinkedIn ↗<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    const ids = ['sbi', 'drone', 'regis', 'fni', 'icelis', 'research'];\n    const setActive = (active) => {\n      ids.forEach((id) => {\n        const dot = document.getElementById('rail-' + id);\n        const lab = document.getElementById('raillab-' + id);\n        const on = id === active;\n        if (dot) { dot.style.background = on ? '#7AA7DD' : 'transparent'; dot.style.borderColor = on ? '#7AA7DD' : '#b8b1a2'; dot.style.transform = on ? 'scale(1.25)' : 'scale(1)'; }\n        if (lab) { lab.style.opacity = on ? '1' : '0'; }\n      });\n    };\n    let ticking = false;\n    const update = () => {\n      ticking = false;\n      const scroller = document.scrollingElement || document.documentElement;\n      const probe = (scroller.scrollTop || window.scrollY || 0) + (window.innerHeight || scroller.clientHeight) * 0.45;\n      let active = null;\n      ids.forEach((id) => {\n        const el = document.getElementById(id);\n        if (!el) return;\n        let top = 0, n = el;\n        while (n) { top += n.offsetTop || 0; n = n.offsetParent; }\n        if (probe >= top) active = id;\n      });\n      setActive(active);\n    };\n    this._onScroll = () => { if (!ticking) { ticking = true; requestAnimationFrame(update); } };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    document.addEventListener('scroll', this._onScroll, { passive: true, capture: true });\n    window.addEventListener('resize', this._onScroll, { passive: true });\n    update();\n\n    const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n\n    this._initFilter();\n\n    // ---- hero typewriter ----\n    const ht1 = document.getElementById('ht1');\n    const ht2 = document.getElementById('ht2');\n    const caret = document.getElementById('caret');\n    if (ht1 && ht2) {\n      const t1 = ht1.getAttribute('data-text') || '';\n      const t2 = ht2.getAttribute('data-text') || '';\n      if (reduce) { ht1.textContent = t1; ht2.textContent = t2; if (caret) caret.style.display = 'none'; }\n      else {\n        ht1.textContent = ''; ht2.textContent = '';\n        const total = t1.length + t2.length; let i = 0;\n        const step = () => {\n          if (i < t1.length) ht1.textContent += t1.charAt(i);\n          else if (i < total) ht2.textContent += t2.charAt(i - t1.length);\n          i++;\n          if (i <= total) {\n            const last = (i > 0) ? (i <= t1.length ? t1.charAt(i - 1) : t2.charAt(i - 1 - t1.length)) : '';\n            this._tw = setTimeout(step, 30 + (last === '.' ? 200 : (last === ',' ? 90 : 0)));\n          } else if (caret) {\n            setTimeout(() => { caret.style.transition = 'opacity .6s'; caret.style.opacity = '0'; }, 1100);\n          }\n        };\n        this._tw = setTimeout(step, 380);\n      }\n    }\n\n    // ---- pipeline draw-in + media reveal (rect-based; robust to any scroller) ----\n    const pipeWrap = document.getElementById('pipeline');\n    const rows = Array.prototype.slice.call(document.querySelectorAll('[data-pipe]'));\n    let revs = Array.prototype.slice.call(document.querySelectorAll('[data-reveal]'));\n    const revealPipe = (row) => {\n      row.classList.add('in');\n      const line = row.querySelector('[data-line]');\n      if (line) setTimeout(() => line.classList.add('draw'), 240);\n    };\n    const checkInView = () => {\n      const vh = window.innerHeight || document.documentElement.clientHeight;\n      let stagger = 0;\n      for (let k = 0; k < rows.length; k++) {\n        const row = rows[k];\n        if (row.__shown) continue;\n        const r = row.getBoundingClientRect();\n        if (r.top < vh * 0.85) {\n          row.__shown = true;\n          setTimeout(((el) => () => revealPipe(el))(row), stagger * 150);\n          stagger++;\n        }\n      }\n      for (let k = revs.length - 1; k >= 0; k--) {\n        const r = revs[k].getBoundingClientRect();\n        if (r.top < vh * 0.92 && r.bottom > 0) { revs[k].classList.add('in'); this._runCountups(revs[k]); revs.splice(k, 1); }\n      }\n    };\n    if (reduce) {\n      rows.forEach((r) => { r.classList.add('in'); const l = r.querySelector('[data-line]'); if (l) l.classList.add('draw'); });\n      revs.forEach((el) => { el.classList.add('in'); this._runCountups(el); });\n    } else {\n      this._onScroll2 = () => checkInView();\n      window.addEventListener('scroll', this._onScroll2, { passive: true });\n      document.addEventListener('scroll', this._onScroll2, { passive: true, capture: true });\n      window.addEventListener('resize', this._onScroll2, { passive: true });\n      checkInView();\n      this._ci1 = setTimeout(checkInView, 320);\n      this._ci2 = setTimeout(checkInView, 1300);\n    }\n  }\n  _initFilter() {\n    const bar = document.getElementById('filterBar');\n    if (!bar) return;\n    const rows = Array.prototype.slice.call(document.querySelectorAll('.pipe-row[data-lens]'));\n    const countEl = document.getElementById('stageCount');\n    const capEl = document.getElementById('filterCaption');\n    const captions = {\n      full: 'The complete record — every role, numbered top to bottom.',\n      leadership: 'Where I founded teams, set direction, and owned delivery.',\n      analyst: 'Where I turned data into evidence-backed decisions.',\n      engineering: 'Where I designed, modeled, and built the technical work.',\n      law: 'Where compliance, regulation, and advisory judgment drove the work.',\n      research: 'Where I re-engineered measurement itself — and proved the gains.',\n    };\n    const pad2 = (n) => (n < 10 ? '0' + n : '' + n);\n    const apply = (lens) => {\n      let visible = 0;\n      rows.forEach((row) => {\n        const tags = (row.getAttribute('data-lens') || '').split(/\\s+/);\n        const show = lens === 'full' || tags.indexOf(lens) >= 0;\n        row.classList.toggle('lens-hidden', !show);\n        if (show) visible++;\n      });\n      if (countEl) countEl.textContent = pad2(visible) + (visible === 1 ? ' STAGE' : ' STAGES') + ' · CLICK TO STEP IN';\n      if (capEl) { capEl.style.opacity = '0'; setTimeout(() => { capEl.textContent = captions[lens] || captions.full; capEl.style.opacity = '1'; }, 200); }\n      Array.prototype.forEach.call(bar.querySelectorAll('button'), (b) => b.classList.toggle('active', b.getAttribute('data-filter') === lens));\n    };\n    Array.prototype.forEach.call(bar.querySelectorAll('button'), (b) => {\n      b.addEventListener('click', () => apply(b.getAttribute('data-filter')));\n    });\n    apply('full');\n  }\n  _runCountups(scope) {\n    const els = scope.querySelectorAll ? scope.querySelectorAll('[data-countup]') : [];\n    els.forEach((el) => {\n      if (el.__counted) return; el.__counted = true;\n      const to = parseFloat(el.getAttribute('data-to')) || 0;\n      const suffix = el.getAttribute('data-suffix') || '';\n      const prefix = el.getAttribute('data-prefix') || '';\n      const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n      if (reduce) { el.textContent = prefix + to + suffix; return; }\n      const dur = 1150; const start = performance.now();\n      const tick = (now) => {\n        const p = Math.min(1, (now - start) / dur);\n        const e = 1 - Math.pow(1 - p, 3);\n        el.textContent = prefix + Math.round(to * e) + suffix;\n        if (p < 1) requestAnimationFrame(tick);\n      };\n      requestAnimationFrame(tick);\n    });\n  }\n  componentWillUnmount() {\n    if (this._onScroll) {\n      window.removeEventListener('scroll', this._onScroll);\n      document.removeEventListener('scroll', this._onScroll, { capture: true });\n      window.removeEventListener('resize', this._onScroll);\n    }\n    if (this._onScroll2) {\n      window.removeEventListener('scroll', this._onScroll2);\n      document.removeEventListener('scroll', this._onScroll2, { capture: true });\n      window.removeEventListener('resize', this._onScroll2);\n    }\n    if (this._tw) clearTimeout(this._tw);\n    if (this._ci1) clearTimeout(this._ci1);\n    if (this._ci2) clearTimeout(this._ci2);\n  }\n  renderVals() { return {}; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
